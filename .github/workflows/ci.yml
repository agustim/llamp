name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Run cargo fmt
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    name: Build releases
    runs-on: ubuntu-latest
    needs: test
    outputs:
      release_version: ${{ steps.release_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install release-plz
        uses: MarcoIeni/release-plz-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from Cargo.toml
        id: release_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release binaries
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build Linux x86_64
        run: |
          cargo build --release --target=x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/llamp llamp-linux-x86_64

      - name: Build Linux aarch64
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo build --release --target=aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/llamp llamp-linux-aarch64

      - name: Build macOS x86_64
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --target=x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/llamp llamp-macos-x86_64

      - name: Build macOS aarch64
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release --target=aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/llamp llamp-macos-aarch64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: llamp-binaries
          path: |
            llamp-linux-x86_64
            llamp-linux-aarch64
            llamp-macos-x86_64
            llamp-macos-aarch64
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: llamp-binaries
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            llamp-linux-x86_64
            llamp-linux-aarch64
            llamp-macos-x86_64
            llamp-macos-aarch64
          body: |
            ### Changes
            - See commit history for details
            
            ### Architecture Support
            - x86_64 / amd64 (Intel/AMD 64-bit)
            - aarch64 / arm64 (ARM 64-bit)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
