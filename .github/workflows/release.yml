name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  download-binaries:
    name: Download cross-compiled binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries from Docker build
        uses: actions/download-artifact@v4
        with:
          name: llamp-binaries
          path: release/

      - name: Verify binaries
        run: |
          ls -la release/
          file release/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/llamp-x86_64-unknown-linux-gnu
            release/llamp-aarch64-unknown-linux-gnu
            release/llamp-armv7-unknown-linux-gnueabihf
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
