name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build binaries for all architectures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf,arm-unknown-linux-gnueabihf

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build for x86_64
        run: cargo build --release --target=x86_64-unknown-linux-gnu

      - name: Build for aarch64
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cargo build --release --target=aarch64-unknown-linux-gnu
        env:
          CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS=1

      - name: Build for armv7
        run: |
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          cargo build --release --target=armv7-unknown-linux-gnueabihf
        env:
          CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc

      - name: Build for arm (v6)
        run: |
          cargo build --release --target=arm-unknown-linux-gnueabihf
        env:
          CC_arm_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: llamp-binaries
          path: |
            target/x86_64-unknown-linux-gnu/release/llamp
            target/aarch64-unknown-linux-gnu/release/llamp
            target/armv7-unknown-linux-gnueabihf/release/llamp
            target/arm-unknown-linux-gnueabihf/release/llamp
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: llamp-binaries
          path: release/

      - name: Rename binaries
        run: |
          mv release/llamp release/llamp-x86_64-unknown-linux-gnu
          mv release/llamp release/llamp-aarch64-unknown-linux-gnu
          mv release/llamp release/llamp-armv7-unknown-linux-gnueabihf
          mv release/llamp release/llamp-arm-unknown-linux-gnueabihf

      - name: Verify binaries
        run: |
          ls -la release/
          file release/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/llamp-x86_64-unknown-linux-gnu
            release/llamp-aarch64-unknown-linux-gnu
            release/llamp-armv7-unknown-linux-gnueabihf
            release/llamp-arm-unknown-linux-gnueabihf
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
