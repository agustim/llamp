name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-with-docker:
    name: Build binaries with Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build cross-compiled binaries with Docker
        run: |
          docker build -f Dockerfile.cross -t llamp-builder .
          mkdir -p release
          docker create --name temp-extract llamp-builder > /dev/null
          docker cp temp-extract:/app/llamp-x86_64 ./release/llamp-x86_64-unknown-linux-gnu
          docker cp temp-extract:/app/llamp-aarch64 ./release/llamp-aarch64-unknown-linux-gnu
          docker cp temp-extract:/app/llamp-armv7 ./release/llamp-armv7-unknown-linux-gnueabihf
          docker rm temp-extract > /dev/null

      - name: Verify binaries
        run: |
          ls -la release/
          file release/*

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: llamp-binaries
          path: release/
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-with-docker
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: llamp-binaries
          path: release/

      - name: Verify binaries
        run: |
          ls -la release/
          file release/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/llamp-x86_64-unknown-linux-gnu
            release/llamp-aarch64-unknown-linux-gnu
            release/llamp-armv7-unknown-linux-gnueabihf
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
